<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Toko Sepatu - Beranda</title>
    <link rel="stylesheet" href="CSS/Mainpage.css" />

    <!-- Script Tailwind dengan Custom Color -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'brand-blue': '#4338CA',
                'brand-blue-hover': '#0044CC',
              }
            }
          }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="bg-white min-h-screen text-gray-900">

<!-- TOP BAR (Sekarang pakai warna Brand Blue) -->
<div class="bg-brand-blue text-white text-[10px] sm:text-xs text-center py-2.5 font-bold uppercase tracking-widest">
    Gratis Ongkir Untuk Member Baru &nbsp;›&nbsp; Daftar Sekarang
</div>

<!-- NAVBAR -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-[1400px] mx-auto px-4 md:px-8 flex items-center justify-between h-16 md:h-20">

        <!-- Logo -->
        <a href="#" class="flex items-center gap-2">
            <svg width="40" height="30" viewBox="0 0 40 30" fill="black">
                <path d="M0 30L10 0H20L10 30H0ZM20 30L30 0H40L30 30H20Z"/>
            </svg>
        </a>

        <!-- Menu Utama -->
        <div class="hidden md:flex items-center gap-6 lg:gap-10 text-sm font-bold uppercase tracking-wide">
            <a href="#" class="hover:underline hover:text-brand-blue underline-offset-4 transition">Sepatu</a>
            <a href="#" class="hover:underline hover:text-brand-blue underline-offset-4 transition">Pria</a>
            <a href="#" class="hover:underline hover:text-brand-blue underline-offset-4 transition">Wanita</a>
            <a href="#" class="text-red-600 hover:underline underline-offset-4">Sale</a>
        </div>

        <!-- Ikon Kanan -->
        <div class="flex items-center gap-4 md:gap-6">
            <div class="relative hidden sm:block border border-gray-300 bg-gray-100 flex items-center px-3 py-1.5 focus-within:border-brand-blue transition">
                <input id="searchInput" type="text" placeholder="Cari..." oninput="renderProducts()" class="bg-transparent border-none focus:outline-none text-sm w-32 lg:w-48"/>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>

            <!-- Wishlist Button -->
            <button onclick="toggleDrawer('wishlist')" class="relative text-black hover:text-brand-blue transition">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span id="wishlistCount" class="absolute -top-1.5 -right-2 bg-brand-blue text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </button>

            <!-- Cart Button -->
            <button onclick="toggleDrawer('cart')" class="relative text-black hover:text-brand-blue transition">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span id="cartCount" class="absolute -top-1.5 -right-2 bg-brand-blue text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="max-w-[1400px] mx-auto px-4 md:px-8 py-8">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 h-auto md:h-64">

        <div class="col-span-1 bg-black p-6 flex flex-col justify-end text-white">
            <h2 class="text-2xl lg:text-3xl font-extrabold uppercase mb-2">Member Sale</h2>
            <p class="text-sm text-gray-300 mb-6">Diskon hingga 30% eksklusif untuk member. Masukkan keranjang sekarang.</p>
            <button class="bg-white text-black font-bold uppercase text-xs px-4 py-2 self-start hover:bg-gray-200">Shop All</button>
        </div>

        <div class="col-span-1 bg-[#f5f5f5] p-4 flex flex-col justify-between border border-transparent hover:border-brand-blue cursor-pointer transition">
            <div class="flex-1 flex items-center justify-center text-gray-400">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            </div>
            <div class="bg-white inline-block px-2 py-1 text-xs font-bold uppercase border border-gray-200 mt-4 self-start text-brand-blue">Must-Haves</div>
        </div>
        <div class="col-span-1 bg-[#f5f5f5] p-4 flex flex-col justify-between border border-transparent hover:border-brand-blue cursor-pointer transition">
            <div class="flex-1 flex items-center justify-center text-gray-400">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            </div>
            <div class="bg-white inline-block px-2 py-1 text-xs font-bold uppercase border border-gray-200 mt-4 self-start text-brand-blue">Pria</div>
        </div>
        <div class="col-span-1 bg-[#f5f5f5] p-4 flex flex-col justify-between border border-transparent hover:border-brand-blue cursor-pointer transition">
            <div class="flex-1 flex items-center justify-center text-gray-400">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            </div>
            <div class="bg-white inline-block px-2 py-1 text-xs font-bold uppercase border border-gray-200 mt-4 self-start text-brand-blue">Wanita</div>
        </div>
    </div>
</section>

<!-- FILTER & SORTING -->
<section class="max-w-[1400px] mx-auto px-4 md:px-8 py-4">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-b border-gray-200 pb-4">

        <!-- Tab Kategori -->
        <div class="flex flex-wrap gap-2">
            <button onclick="setCategory('all')" id="cat-all" class="cat-btn bg-brand-blue text-white border border-brand-blue px-3 py-1.5 text-xs font-bold uppercase transition">Semua</button>
            <button onclick="setCategory('must-have')" id="cat-must-have" class="cat-btn bg-white text-black border border-gray-300 hover:border-brand-blue hover:text-brand-blue px-3 py-1.5 text-xs font-bold uppercase transition">Must-Haves</button>
            <button onclick="setCategory('sale')" id="cat-sale" class="cat-btn bg-white text-black border border-gray-300 hover:border-brand-blue hover:text-brand-blue px-3 py-1.5 text-xs font-bold uppercase transition">Sale</button>
            <button onclick="setCategory('running')" id="cat-running" class="cat-btn bg-white text-black border border-gray-300 hover:border-brand-blue hover:text-brand-blue px-3 py-1.5 text-xs font-bold uppercase transition">Running</button>
        </div>

        <!-- Filter Nama & Harga -->
        <div class="flex flex-wrap items-center gap-4 bg-gray-50 p-2 border border-gray-200">
            <select id="sortSelect" onchange="renderProducts()" class="bg-white border border-gray-300 text-xs py-1.5 px-2 focus:outline-none focus:border-brand-blue font-medium cursor-pointer">
                <option value="default">Urutkan: Relevansi</option>
                <option value="name-asc">Nama: A - Z</option>
                <option value="name-desc">Nama: Z - A</option>
                <option value="price-asc">Harga: Rendah ke Tinggi</option>
                <option value="price-desc">Harga: Tinggi ke Rendah</option>
            </select>

            <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-gray-600">Max Rp:</span>
                <input type="range" id="priceRange" min="500000" max="3000000" step="100000" value="3000000" oninput="updatePriceLabel(); renderProducts()" class="w-24 accent-brand-blue cursor-pointer"/>
                <span id="priceLabel" class="text-xs font-bold w-16 text-brand-blue">3.0M</span>
            </div>
        </div>

    </div>
</section>

<!-- PRODUCT GRID -->
<section class="max-w-[1400px] mx-auto px-4 md:px-8 py-6 pb-20">
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
        <!-- Produk di-inject dari JS -->
    </div>

    <div id="emptyState" class="hidden py-16 text-center text-gray-500 text-sm border border-dashed border-gray-300 mt-4">
        Produk tidak ditemukan dengan filter tersebut.
    </div>
</section>

<!-- DRAWER -->
<div id="overlay" onclick="closeDrawer()" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden opacity-0 overlay-transition"></div>
<div id="drawer" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white z-50 translate-x-full drawer-transition flex flex-col border-l border-gray-200 shadow-xl">

    <div class="flex items-center justify-between p-5 border-b border-gray-200">
        <h2 id="drawerTitle" class="text-lg font-bold uppercase tracking-wide text-brand-blue">Keranjang</h2>
        <button onclick="closeDrawer()" class="text-black hover:text-red-500 transition">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div id="drawerItems" class="flex-1 overflow-y-auto p-5 space-y-4"></div>

    <div id="drawerFooter" class="p-5 border-t border-gray-200 bg-gray-50 hidden">
        <div class="flex justify-between font-bold text-lg mb-4">
            <span>Total:</span>
            <span id="cartTotal" class="text-brand-blue">Rp 0</span>
        </div>
        <button class="w-full bg-brand-blue hover:bg-brand-blue-hover text-white font-bold uppercase py-3 transition">
            Checkout Sekarang
        </button>
    </div>
</div>

<script>
    // DATA DATABASE
    const DATABASE = [
        { id: 1, name: "Ultraboost Light", price: 2800000, category: "running", image_url: null },
        { id: 2, name: "Samba OG", price: 2100000, category: "must-have", image_url: null },
        { id: 3, name: "Duramo SL", price: 900000, category: "running", image_url: null },
        { id: 4, name: "NMD_R1 V2", price: 2400000, category: "sale", image_url: null },
        { id: 5, name: "Stan Smith", price: 1700000, category: "must-have", image_url: null },
        { id: 6, name: "Forum Low", price: 1600000, category: "sale", image_url: null },
        { id: 7, name: "Adizero Adios", price: 2900000, category: "running", image_url: null },
        { id: 8, name: "Ozweego", price: 1900000, category: "must-have", image_url: null },
    ];

    let currentCategory = 'all';
    let cart = {};
    let wishlist = {};
    let activeDrawer = 'cart';

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    function updatePriceLabel() {
        const val = document.getElementById('priceRange').value;
        document.getElementById('priceLabel').innerText = (val / 1000000).toFixed(1) + 'M';
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('bg-brand-blue', 'text-white', 'border-brand-blue');
            btn.classList.add('bg-white', 'text-black', 'border-gray-300');
        });
        const activeBtn = document.getElementById('cat-' + cat);
        activeBtn.classList.remove('bg-white', 'text-black', 'border-gray-300');
        activeBtn.classList.add('bg-brand-blue', 'text-white', 'border-brand-blue');
        renderProducts();
    }

    function renderProducts() {
        let products = [...DATABASE];
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        const maxPrice = parseInt(document.getElementById('priceRange').value);
        const sortType = document.getElementById('sortSelect').value;

        if (currentCategory !== 'all') products = products.filter(p => p.category === currentCategory);
        if (searchVal) products = products.filter(p => p.name.toLowerCase().includes(searchVal));
        products = products.filter(p => p.price <= maxPrice);

        if (sortType === 'name-asc') products.sort((a, b) => a.name.localeCompare(b.name));
        if (sortType === 'name-desc') products.sort((a, b) => b.name.localeCompare(a.name));
        if (sortType === 'price-asc') products.sort((a, b) => a.price - b.price);
        if (sortType === 'price-desc') products.sort((a, b) => b.price - a.price);

        const grid = document.getElementById('productGrid');
        const empty = document.getElementById('emptyState');
        grid.innerHTML = '';

        if (products.length === 0) {
            empty.classList.remove('hidden');
        } else {
            empty.classList.add('hidden');
            products.forEach(p => {
                const inWishlist = wishlist[p.id];
                const inCart = cart[p.id] ? true : false;

                grid.innerHTML += `
                <div class="group relative flex flex-col border border-transparent hover:border-brand-blue pb-2 transition">
                    <div class="bg-[#f5f5f5] aspect-[4/5] relative flex items-center justify-center p-4">
                        <button onclick="toggleWishlist(${p.id})" class="absolute top-3 right-3 z-10 transition ${inWishlist ? 'text-brand-blue' : 'text-gray-400 hover:text-brand-blue'}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="${inWishlist ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                        </button>
                        ${p.image_url
                            ? `<img src="${p.image_url}" alt="${p.name}" class="w-full h-full object-cover"/>`
                            : `<span class="text-xs text-gray-400 font-bold uppercase tracking-widest text-center">Gambar<br>Kosong</span>`
                        }
                    </div>

                    <div class="mt-3 px-2 flex-1 flex flex-col">
                        <h3 class="text-sm font-medium text-gray-800 group-hover:text-brand-blue transition">${p.name}</h3>
                        <p class="text-sm font-bold text-gray-900 mt-1">${formatRp(p.price)}</p>

                        <button onclick="addToCart(${p.id})" class="mt-auto pt-4 text-xs font-bold uppercase text-left ${inCart ? 'text-brand-blue' : 'text-gray-500 hover:text-brand-blue transition'}">
                            ${inCart ? '✔ Di Keranjang' : '+ Tambah Keranjang'}
                        </button>
                    </div>
                </div>`;
            });
        }
        updateBadges();
    }

    function addToCart(id) {
        if (!cart[id]) cart[id] = 1;
        else cart[id]++;
        renderProducts();
        if(document.getElementById('drawer').classList.contains('translate-x-0')) renderDrawer();
    }

    function toggleWishlist(id) {
        if (wishlist[id]) delete wishlist[id];
        else wishlist[id] = true;
        renderProducts();
        if(document.getElementById('drawer').classList.contains('translate-x-0')) renderDrawer();
    }

    function updateCartQty(id, delta) {
        cart[id] += delta;
        if(cart[id] <= 0) delete cart[id];
        renderDrawer();
        renderProducts();
    }

    function updateBadges() {
        let totalCart = Object.values(cart).reduce((a, b) => a + b, 0);
        let totalWishlist = Object.keys(wishlist).length;

        document.getElementById('cartCount').innerText = totalCart;
        document.getElementById('wishlistCount').innerText = totalWishlist;
    }

    function toggleDrawer(type) {
        activeDrawer = type;
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');

        document.getElementById('drawerTitle').innerText = type === 'cart' ? 'Keranjang Belanja' : 'Wishlist Kamu';

        overlay.classList.remove('hidden');
        setTimeout(() => {
            overlay.classList.remove('opacity-0');
            drawer.classList.remove('translate-x-full');
        }, 10);

        renderDrawer();
    }

    function closeDrawer() {
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');

        drawer.classList.add('translate-x-full');
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    function renderDrawer() {
        const itemsContainer = document.getElementById('drawerItems');
        const footer = document.getElementById('drawerFooter');
        itemsContainer.innerHTML = '';

        let totalHarga = 0;
        let dataToRender = activeDrawer === 'cart' ? Object.keys(cart) : Object.keys(wishlist);

        if (dataToRender.length === 0) {
            itemsContainer.innerHTML = `<p class="text-sm text-gray-500 mt-10 text-center">Belum ada barang di sini.</p>`;
            footer.classList.add('hidden');
            return;
        }

        dataToRender.forEach(idStr => {
            const id = parseInt(idStr);
            const p = DATABASE.find(x => x.id === id);

            if (activeDrawer === 'cart') {
                const qty = cart[id];
                totalHarga += (p.price * qty);
                itemsContainer.innerHTML += `
                <div class="flex gap-4 border border-gray-200 p-2 hover:border-brand-blue transition">
                    <div class="w-16 h-16 bg-gray-100 flex-shrink-0">
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : ''}
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-gray-800">${p.name}</h4>
                        <p class="text-xs text-brand-blue font-bold mb-2">${formatRp(p.price)}</p>
                        <div class="flex items-center gap-3">
                            <button onclick="updateCartQty(${id}, -1)" class="w-6 h-6 flex items-center justify-center border border-gray-300 hover:bg-gray-100 font-bold transition">-</button>
                            <span class="text-xs font-bold">${qty}</span>
                            <button onclick="updateCartQty(${id}, 1)" class="w-6 h-6 flex items-center justify-center border border-gray-300 hover:bg-gray-100 font-bold transition">+</button>
                        </div>
                    </div>
                </div>`;
                footer.classList.remove('hidden');
                document.getElementById('cartTotal').innerText = formatRp(totalHarga);
            } else {
                itemsContainer.innerHTML += `
                <div class="flex items-center gap-4 border border-gray-200 p-2 hover:border-brand-blue transition">
                    <div class="w-16 h-16 bg-gray-100 flex-shrink-0">
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : ''}
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-gray-800">${p.name}</h4>
                        <p class="text-xs text-brand-blue font-bold mb-1">${formatRp(p.price)}</p>
                    </div>
                    <button onclick="addToCart(${id})" class="text-xs font-bold text-white bg-brand-blue px-3 py-1.5 uppercase hover:bg-brand-blue-hover transition">Add</button>
                    <button onclick="toggleWishlist(${id})" class="text-xs font-bold text-gray-400 hover:text-red-500 ml-2 transition">X</button>
                </div>`;
                footer.classList.add('hidden');
            }
        });
    }

    renderProducts();
</script>

</body>
</html>
